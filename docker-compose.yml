services:

  # ─── PostgreSQL Database ─────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datavault}
      POSTGRES_USER: ${POSTGRES_USER:-datavault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datavault}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datavault}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Django Web Application ──────────────────────────────
  web:
    build: .

    command: sh -c "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --workers 2 --access-logfile - --reload"
    volumes:

      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:       # PostgreSQL data directory
  media_data:   # Uploaded PDF files
